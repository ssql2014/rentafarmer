<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">凤里村农田静态定位截图</title>
  <desc id="desc">浙江省温州市平阳县鳌江镇凤里村农田的静态示意截图，展示农田、水系、道路、监控点和人工核验状态。</desc>
  <defs>
    <linearGradient id="soil" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8f7a45"/>
      <stop offset="1" stop-color="#5f6f34"/>
    </linearGradient>
    <pattern id="rows" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(16)">
      <rect width="26" height="26" fill="#7d9b4e"/>
      <rect width="8" height="26" fill="#426f3c" opacity=".42"/>
      <rect x="15" width="4" height="26" fill="#c6b46d" opacity=".42"/>
    </pattern>
    <pattern id="vegetable" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <rect width="34" height="34" fill="#6d9b50"/>
      <circle cx="8" cy="8" r="3" fill="#cfe2a4" opacity=".75"/>
      <circle cx="24" cy="20" r="3" fill="#345f35" opacity=".5"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2b1e" flood-opacity=".18"/>
    </filter>
  </defs>

