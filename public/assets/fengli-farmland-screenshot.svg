    <path d="M0 -78 C43 -78 78 -43 78 0 C78 52 18 96 0 128 C-18 96 -78 52 -78 0 C-78 -43 -43 -78 0 -78Z" fill="#d93c2e" stroke="#fff" stroke-width="8"/>
    <circle r="28" fill="#fff"/>
    <circle r="14" fill="#d93c2e"/>
