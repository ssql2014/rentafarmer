  <text x="54" y="724" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" fill="#4f5d52">RentAFarmer 静态农田截图 | 非实时地图嵌入 | 田界待平阳鳌江接口人核验</text>
