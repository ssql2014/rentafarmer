  <path d="M-40 478 C190 430 348 438 560 384 C800 323 990 325 1330 264" fill="none" stroke="#c9b18a" stroke-width="42" opacity=".95"/>
  <path d="M-50 486 C190 438 348 446 560 392 C800 331 990 333 1330 272" fill="none" stroke="#f2e4c8" stroke-width="16" opacity=".88"/>
  <path d="M1010 -20 C954 150 942 272 858 404 C780 526 748 612 724 796" fill="none" stroke="#8ab6d6" stroke-width="58" opacity=".92"/>
  <path d="M1012 -20 C956 150 944 272 860 404 C782 526 750 612 726 796" fill="none" stroke="#c8e4f2" stroke-width="24" opacity=".94"/>

