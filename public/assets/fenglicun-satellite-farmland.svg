<svg xmlns="http://www.w3.org/2000/svg" width="1512" height="1102" viewBox="0 0 1512 1102" role="img" aria-labelledby="title desc">
  <title id="title">FengLiCun 农田卫星图</title>
  <desc id="desc">根据用户提供的 FengLiCun 卫星农田图制作的本地静态展示图，包含 Fengli Strawberry Plucking Park、FengLiCun、河道、田间路和农田纹理。</desc>
  <defs>
    <filter id="labelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#07111f" flood-opacity=".85"/>
    </filter>
    <filter id="pinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#15202b" flood-opacity=".5"/>
    </filter>
    <pattern id="fieldRowsA" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <rect width="34" height="34" fill="#8b8769"/>
      <rect width="4" height="34" fill="#b1aa82" opacity=".42"/>
      <rect x="15" width="3" height="34" fill="#5f6f4d" opacity=".32"/>
    </pattern>
    <pattern id="fieldRowsB" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <rect width="42" height="42" fill="#7d8464"/>
      <rect width="5" height="42" fill="#b8b08a" opacity=".34"/>
      <rect x="24" width="4" height="42" fill="#4e6c43" opacity=".3"/>
    </pattern>
    <pattern id="greenhouse" width="56" height="22" patternUnits="userSpaceOnUse">
